name: Refresh data & deploy

# Free continuous-update engine on GitHub's free tier. Two speeds, on purpose:
#   • schedule / manual dispatch → CRAWL every source (~40 min), rebuild the
#     canonical layer, then export + publish. This is what keeps data fresh.
#   • push to main (a code change) → SKIP the crawl and build from the cached
#     database, so a code deploy is ~2 min instead of ~40. The data is already
#     canonical from the last scheduled crawl, and the site filters to
#     today-onward at build time, so nothing stale slips through.
# Net: code ships fast AND data stays current — without a 40-min crawl gating
# every commit (which had the site lagging ~40 min behind reality).
on:
  schedule:
    - cron: '17 4,16 * * *' # twice daily, off the top of the hour
  workflow_dispatch:
    inputs:
      db_source:
        description: 'crawl = re-fetch every source (~40 min); committed = build the repo''s data/loppefund.db as-is (~3 min, for a locally-prepared DB)'
        type: choice
        options: [crawl, committed]
        default: crawl
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a running one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # The crawl politely fetches ~1500 source pages, so a full run is ~35 min.
    # Bound it so a genuinely stuck source (or a runaway loop) fails fast instead
    # of holding the pages-deploy lock for GitHub's 6-hour default and starving
    # every later deploy — "continuously updated" depends on the queue draining.
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      # Pages site already exists (created via API with build_type=workflow).
      - uses: actions/configure-pages@v5

      # Node 24+: node:sqlite and TS type-stripping work without flags.
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Persist the SQLite database across runs so the geocode cache and the
      # immutable raw layer survive — each run is an incremental crawl, not a
      # cold start. The rotating key + restore-keys fallback loads the newest.
      # Skipped for a "committed" dispatch, which deploys the repo's DB verbatim.
      - name: Restore database
        if: github.event.inputs.db_source != 'committed'
        uses: actions/cache/restore@v4
        with:
          path: data
          key: loppefund-db-${{ github.run_id }}
          restore-keys: |
            loppefund-db-

      - run: npm install --no-audit --no-fund

      # Only crawl on a schedule or manual dispatch — never on a plain code push,
      # nor a "committed" dispatch — so those deploy fast from an existing DB.
      - name: Crawl sources & rebuild canonical layer
        if: github.event_name != 'push' && github.event.inputs.db_source != 'committed'
        env:
          # Default: the local committed feed from scripts/fb-harvest.mjs, read
          # straight from the checkout (no network, no CDN lag). A repo var/secret
          # can override with a vendor dataset URL. (Was previously read only from
          # `secrets.`, but the value lives in `vars.` — so it silently ingested
          # nothing; hence this explicit fallback chain.)
          LOPPEFUND_FB_FEED_URLS: ${{ vars.LOPPEFUND_FB_FEED_URLS || secrets.LOPPEFUND_FB_FEED_URLS || 'data/fb-harvest.json' }}
          # Sæt APIFY_TOKEN som repo-secret, så høstes Facebook-events/-grupper
          # automatisk fra actor'ens seneste kørsel (se apify/README.md).
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          APIFY_ACTORS: ${{ vars.APIFY_ACTORS }}
        run: |
          node packages/pipeline/src/cli.ts run
          node packages/pipeline/src/cli.ts tips || true
          # Continuously discover new sources: mine domains mentioned in the
          # crawled data, probe the strongest for event-schema signals, and
          # keep the candidate list fresh for review/promotion. Never blocks
          # the deploy. Cheap: reads existing raw events + politely probes a few.
          node packages/pipeline/src/cli.ts discover-sources --probe-limit 8 || true
          node packages/pipeline/src/cli.ts stats

      # Persist only when we actually crawled — a push reuses the restored cache
      # unchanged, so there's nothing new to save.
      - name: Save database
        uses: actions/cache/save@v4
        if: always() && github.event_name != 'push' && github.event.inputs.db_source != 'committed'
        with:
          path: data
          key: loppefund-db-${{ github.run_id }}

      # Next's static export renders hundreds of pages across parallel workers,
      # each opening the SQLite file read-only. If a hot rollback journal is
      # present (e.g. left in the restored cache), a read-only open can't roll it
      # back and fails with "database is locked", sinking the whole deploy. A
      # single read-write open+close here rolls back any hot journal cleanly (the
      # safe SQLite recovery — it never discards committed data), so every worker
      # then opens a clean file. No-op when the journal is already clean.
      - name: Clear any hot SQLite journal before parallel export
        run: |
          node -e "const {DatabaseSync}=require('node:sqlite'); const fs=require('fs'); const p='data/loppefund.db'; if(fs.existsSync(p)){const db=new DatabaseSync(p); db.exec('PRAGMA journal_mode=DELETE; PRAGMA wal_checkpoint(TRUNCATE); SELECT 1;'); db.close(); console.log('sqlite journal clean');}"

      - name: Static export
        env:
          LOPPEFUND_STATIC: '1'
          LOPPEFUND_BASE_URL: ${{ vars.LOPPEFUND_BASE_URL }}
          LOPPEFUND_BASE_PATH: ${{ vars.LOPPEFUND_BASE_PATH }}
          NEXT_PUBLIC_WEB3FORMS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_KEY }}
          NEXT_PUBLIC_TIP_EMAIL: ${{ vars.NEXT_PUBLIC_TIP_EMAIL }}
        run: npm run build --workspace @loppefund/web

      # Jekyll would eat the _next/ directory otherwise.
      - run: touch apps/web/out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - id: deployment
        uses: actions/deploy-pages@v4
        with:
          # First deployments to a fresh Pages site can be slow/flaky;
          # default 10 min timeout + 10 errors aborted run 2.
          timeout: 1200000
          error_count: 60
          reporting_interval: 10000

      # IndexNow: tell Bing/DuckDuckGo/Yandex about every fresh URL after
      # each deploy — free, no account, key file is served from the site.
      - name: Ping IndexNow
        continue-on-error: true
        env:
          BASE: ${{ vars.LOPPEFUND_BASE_URL }}
          KEY: 15b31cab260b1e8fe4446bf5ed4b197c
        run: |
          sleep 30
          python3 "$GITHUB_WORKSPACE/scripts/indexnow.py"
